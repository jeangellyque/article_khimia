<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стаття з хімії</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f4f7fb, #e7eef8);
            color: #1f2a44;
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        .card {
            width: min(900px, 100%);
            background: #ffffff;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 45px rgba(31, 42, 68, 0.12);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: clamp(2rem, 4vw, 3rem);
        }

        p {
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        figure {
            margin: 0;
        }

        img {
            display: block;
            width: 100%;
            max-width: 100%;
            height: auto;
            border-radius: 18px;
            object-fit: cover;
        }

        figcaption {
            margin-top: 12px;
            color: #5b6785;
            font-size: 0.95rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="card">
            <h1>Заготовка для статті</h1>
            <p>
                Це базова сторінка для майбутньої статті. Сюди можна додати текст,
                блоки з формулами, підзаголовки та інші матеріали.
            </p>

            <figure>
                <img src="images/70.jpg" alt="Ілюстрація до статті з хімії">
                <figcaption>Фото підвантажується з папки <code>images</code>.</figcaption>
            </figure>
        </section>
    </main>
</body>
</html>
